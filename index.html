<title>StayProof — One search. Three platforms. Real ratings.</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 580px; margin: 80px auto; padding: 0 20px; color: #333; text-align: center; }
